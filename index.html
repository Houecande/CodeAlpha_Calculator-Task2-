<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <meta name="description" content="Glassmorphism calculator" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <a class="back-link" href="landing_page.html">&larr; Back to landing page</a>

  <div class="orb orb1" aria-hidden="true"></div>
  <div class="orb orb2" aria-hidden="true"></div>
  <div class="orb orb3" aria-hidden="true"></div>

  <div id="calc" role="application" aria-label="Calculatrice">

    <div class="display" aria-live="polite" aria-atomic="true">
      <div class="disp-expr" id="expr"></div>
      <div class="disp-main" id="disp">0</div>
    </div>

    <div class="btns" role="group" aria-label="Calculator keys">
      <button class="btn btn-clear" data-action="clear" aria-label="Clear all">AC</button>
      <button class="btn btn-fn"    data-action="sign"  aria-label="Change sign">+/&minus;</button>
      <button class="btn btn-fn"    data-action="pct"   aria-label="Percentage">%</button>
      <button class="btn btn-op"    data-op="/"         aria-label="Divide">&divide;</button>

      <button class="btn btn-num" data-num="7">7</button>
      <button class="btn btn-num" data-num="8">8</button>
      <button class="btn btn-num" data-num="9">9</button>
      <button class="btn btn-op"  data-op="*" aria-label="Multiply">&times;</button>

      <button class="btn btn-num" data-num="4">4</button>
      <button class="btn btn-num" data-num="5">5</button>
      <button class="btn btn-num" data-num="6">6</button>
      <button class="btn btn-op"  data-op="-" aria-label="Subtract">&minus;</button>

      <button class="btn btn-num" data-num="1">1</button>
      <button class="btn btn-num" data-num="2">2</button>
      <button class="btn btn-num" data-num="3">3</button>
      <button class="btn btn-op"  data-op="+" aria-label="Add">+</button>

      <button class="btn btn-num btn-zero" data-num="0">0</button>
      <button class="btn btn-num" data-num=".">.</button>
      <button class="btn btn-eq"  data-action="eq" aria-label="Calculate result">=</button>
    </div>

    <p class="kbd-hint">Keyboard supported · Esc = AC</p>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
